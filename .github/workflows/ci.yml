name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — Quality gates: lint · type-check · unit tests
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  quality:
    name: Lint · Type-check · Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests + coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: coverage
          flags: school-admin
          fail_ci_if_error: false

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 — Next.js production build
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Next.js build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}

# ─────────────────────────────────────────────────────────────────────────────
# Job 3 — Storybook: build + interaction + a11y tests (Vitest + Playwright)
# ─────────────────────────────────────────────────────────────────────────────
  storybook:
    name: Storybook · Interaction & A11y tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Storybook
        run: npm run storybook:build

      - name: Run Storybook tests (interaction + a11y)
        run: npm run storybook:test

      - name: Upload Storybook build artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: storybook-static
          path: storybook-static
          retention-days: 7

      - name: Upload test results on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: storybook-test-results
          path: test-results/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Job 4 — Visual regression via Chromatic
# ─────────────────────────────────────────────────────────────────────────────
  chromatic:
    name: Visual regression (Chromatic)
    runs-on: ubuntu-latest
    needs: storybook

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Chromatic needs full history for baselines

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download Storybook artifact
        uses: actions/download-artifact@v4
        with:
          name: storybook-static
          path: storybook-static

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: storybook-static
          # Only test stories affected by the PR's changed files
          onlyChanged: true
          # Don't fail CI on visual changes — flag for human review instead
          exitZeroOnChanges: true
